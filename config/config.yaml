# Cấu hình công cụ phát hiện email phishing bằng AI

# Thiết lập nhà cung cấp LLM
llm:
  provider: openai
  api:
    base_url: https://integrate.api.nvidia.com/v1
    api_key: ${OPENAI_API_KEY}
    model: deepseek-ai/deepseek-v4-flash
    temperature: 0.1
    max_tokens: 20000
    timeout: 30

detection:
  confidence_threshold: 0.7
  verbose: true
  extract_iocs: true

parsing:
  extract_urls: true
  extract_emails: true
  analyze_attachments: false

sandbox:
  enabled: false
  cuckoo_api: http://localhost:8090
  timeout: 120

logging:
  level: INFO
  file: logs/detector.log
